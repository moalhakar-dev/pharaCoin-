<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- === تحسينات SEO محسنة === -->
    <title>تواصل معنا - PharaCoin | الدعم الفني عبر التليجرام</title>
    <meta name="description" content="تواصل مع فريق دعم PharaCoin عبر التليجرام على @PharacoinSupport. نحن هنا لمساعدتك في أي استفسار أو مشكلة.">
    <meta name="keywords" content="PharaCoin, تواصل معنا, دعم فني, تليجرام, مساعدة">
    <meta name="author" content="PharaCoin Team">
    <meta name="robots" content="index, follow">

    <!-- === بطاقات المشاركة الاجتماعية (Open Graph / Twitter) === -->
    <!-- ====================== غير هذه الروابط ====================== -->
    <meta property="og:title" content="تواصل معنا - PharaCoin">
    <meta property="og:description" content="تواصل مع فريق دعم PharaCoin عبر التليجرام على @PharacoinSupport.">
    <!-- غير الرابط التالي إلى رابط الصورة التي تريد ظهورها عند المشاركة (مثل شعار الموقع) -->
    <meta property="og:image" content="https://yourdomain.com/og-image.jpg">   <!-- قم بتغيير yourdomain.com إلى نطاقك الفعلي وحدد مسار الصورة -->
    <!-- غير الرابط التالي إلى رابط هذه الصفحة على موقعك الفعلي -->
    <meta property="og:url" content="https://yourdomain.com/contact.html">     <!-- غيّر yourdomain.com إلى اسم موقعك -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PharaCoin">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="تواصل معنا - PharaCoin">
    <meta name="twitter:description" content="تواصل مع فريق دعم PharaCoin عبر التليجرام على @PharacoinSupport.">
    <!-- غير الرابط التالي إلى رابط الصورة المخصصة لتويتر (يمكن أن تكون نفس الصورة أعلاه) -->
    <meta name="twitter:image" content="https://yourdomain.com/twitter-image.jpg"> <!-- غيّر yourdomain.com ومسار الصورة -->
    <meta name="twitter:site" content="@PharaCoinApp">                         <!-- غيّر @PharaCoinApp إلى حساب تويتر الخاص بك إن وجد -->
    <!-- ================================================================= -->

    <!-- === الرابط الأساسي (Canonical) === -->
    <!-- غيّر الرابط التالي إلى رابط هذه الصفحة على موقعك الفعلي -->
    <link rel="canonical" href="https://yourdomain.com/contact.html">   <!-- غيّر yourdomain.com إلى نطاقك -->

    <!-- === البيانات المنظمة (Structured Data) لصفحة التواصل === -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ContactPage",
        "name": "تواصل معنا - PharaCoin",
        "description": "صفحة التواصل مع فريق دعم PharaCoin عبر التليجرام.",
        "url": "https://yourdomain.com/contact.html",          <!-- غيّر yourdomain.com -->
        "isPartOf": {
            "@type": "WebSite",
            "name": "PharaCoin",
            "url": "https://yourdomain.com"                   <!-- غيّر yourdomain.com -->
        }
    }
    </script>

    <!-- الخطوط والأنماط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        body{
          font-family:'Cairo',sans-serif;
          background:#000;
          color:#fff;
          max-width:480px;
          margin:auto;
        }

        /* الخلفية */
        .page-bg{
          position:fixed;
          inset:0;
          background:url("Object/qa.jpg") center/cover no-repeat;
          filter:brightness(0.25) saturate(1.2);
          z-index:-1;
        }

        /* الهيدر */
        .header{
          display:flex;
          justify-content:center;
          align-items:center;
          padding:16px;
          background:rgba(0,0,0,0.85);
          border-bottom:1px solid rgba(255,0,0,0.4);
          backdrop-filter:blur(10px);
        }
        .header h1{
          color:red;
          font-weight:900;
          font-size:18px;
          text-shadow:0 0 10px red,0 0 25px darkred;
          margin:0;
        }

        /* العنوان */
        .page-title{
          text-align:center;
          margin:18px 0 12px;
          color:red;
          font-size:18px;
          font-weight:800;
          text-shadow:0 0 10px red;
        }

        /* الصندوق */
        .box{
          margin:0 16px;
          padding:22px;
          background:rgba(0,0,0,0.65);
          border-radius:20px;
          border:1px solid rgba(255,0,0,0.4);
          box-shadow:0 0 30px rgba(0,0,0,0.7);
          text-align:center;
        }

        /* أيقونة */
        .contact-icon{
          font-size:55px;
          color:red;
          margin-bottom:15px;
          text-shadow:0 0 15px red;
        }

        /* اليوزر */
        .username{
          background:#111;
          padding:14px;
          border-radius:10px;
          border:1px solid red;
          font-weight:bold;
          font-size:16px;
          margin-bottom:15px;
          word-break:break-all;
        }

        /* زر */
        .contact-btn{
          width:100%;
          padding:14px;
          border:none;
          border-radius:12px;
          background:red;
          color:white;
          font-weight:bold;
          cursor:pointer;
          transition:.2s;
          font-size:15px;
          box-shadow:0 0 15px white,0 0 30px red;
        }

        .contact-btn:hover{
          transform:scale(1.05);
          box-shadow:0 0 25px white,0 0 60px red;
        }

        .note{
          margin-top:15px;
          opacity:.85;
          font-size:13px;
        }
        .footer-links {
          text-align: center;
          margin: 20px 16px;
          padding: 10px;
          background: rgba(0,0,0,0.5);
          border-radius: 10px;
          font-size: 12px;
        }
        .footer-links a {
          color: gold;
          text-decoration: none;
          margin: 0 5px;
        }
        .footer-links a:hover {
          text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="page-bg"></div>

<div class="header">
  <h1>📞 PharaCoin</h1>   <!-- تم تغيير div إلى h1 -->
</div>

<h2 class="page-title">تواصل معنا</h2>   <!-- استخدام h2 للتسلسل الصحيح -->

<div class="box">

  <div class="contact-icon" aria-hidden="true">
    <i class="fa-brands fa-telegram"></i>
  </div>

  <div class="username" id="telegram" aria-label="يوزر التليجرام الخاص بالدعم">
    @PharacoinSupport
  </div>

  <button class="contact-btn" onclick="openTelegram()" aria-label="فتح محادثة تليجرام">
    فتح التليجرام
  </button>

  <button class="contact-btn" onclick="copyUser()" style="margin-top:10px;" aria-label="نسخ يوزر التليجرام">
    نسخ اليوزر
  </button>

  <div class="note">
    اضغط على زر فتح التليجرام للتواصل مباشرة مع فريق الدعم
  </div>

</div>

<!-- روابط إضافية أسفل الصفحة (محسنة بعناوين وصفية) -->
<div class="footer-links">
  <a href="convert.html" title="تحويل العملات">💱 تحويل العملات</a> |
  <a href="contact.html" title="تواصل معنا">📞 تواصل معنا</a> |
  <a href="about.html" title="من نحن">ℹ️ من نحن</a> |
  <a href="faq.html" title="الأسئلة الشائعة">❓ الأسئلة الشائعة</a> |
  <a href="terms.html" title="شروط الاستخدام">📜 الشروط</a> |
  <a href="privacy.html" title="سياسة الخصوصية">🔒 الخصوصية</a>
</div>

<script>
function openTelegram(){
  window.open("https://t.me/PharacoinSupport", "_blank");
}

function copyUser(){
  navigator.clipboard.writeText("@PharacoinSupport");
  alert("تم نسخ اليوزر ✔");
}
</script>

<!-- الأجزاء التي تحتاج تغيير (تلخيص) -->
<!--
  1. روابط الصور الاجتماعية (og:image, twitter:image) استبدل yourdomain.com بالرابط الفعلي لصورك.
  2. روابط URL (og:url, canonical, JSON-LD) استبدل yourdomain.com بنطاق موقعك.
  3. حساب تويتر (twitter:site) غيّره إلى حسابك أو احذفه.
  4. نص يوزر التليجرام (@PharacoinSupport) يمكن تغييره إلى اليوزر الفعلي لفريق الدعم الخاص بك.
  5. رابط التليجرام في دالة openTelegram() يمكن تغييره إلى رابط الدعم الفعلي.
-->
</body>
</html>
