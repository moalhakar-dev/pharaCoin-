<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تواصل معنا - PharaCoin</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Cairo',sans-serif;
  background:#000;
  color:#fff;
  max-width:480px;
  margin:auto;
}

/* الخلفية */
.page-bg{
  position:fixed;
  inset:0;
  background:url("Object/qa.jpg") center/cover no-repeat;
  filter:brightness(0.25) saturate(1.2);
  z-index:-1;
}

/* الهيدر */
.header{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
  background:rgba(0,0,0,0.85);
  border-bottom:1px solid rgba(255,0,0,0.4);
  backdrop-filter:blur(10px);
}
.logo{
  color:red;
  font-weight:900;
  font-size:18px;
  text-shadow:0 0 10px red,0 0 25px darkred;
}

/* العنوان */
.section-title{
  text-align:center;
  margin:18px 0 12px;
  color:red;
  font-size:18px;
  font-weight:800;
  text-shadow:0 0 10px red;
}

/* الصندوق */
.box{
  margin:0 16px;
  padding:22px;
  background:rgba(0,0,0,0.65);
  border-radius:20px;
  border:1px solid rgba(255,0,0,0.4);
  box-shadow:0 0 30px rgba(0,0,0,0.7);
  text-align:center;
}

/* أيقونة */
.contact-icon{
  font-size:55px;
  color:red;
  margin-bottom:15px;
  text-shadow:0 0 15px red;
}

/* اليوزر */
.username{
  background:#111;
  padding:14px;
  border-radius:10px;
  border:1px solid red;
  font-weight:bold;
  font-size:16px;
  margin-bottom:15px;
  word-break:break-all;
}

/* زر */
.contact-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:red;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
  font-size:15px;
  box-shadow:0 0 15px white,0 0 30px red;
}

.contact-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px white,0 0 60px red;
}

.note{
  margin-top:15px;
  opacity:.85;
  font-size:13px;
}
.footer-links {
  text-align: center;
  margin: 20px 16px;
  padding: 10px;
  background: rgba(0,0,0,0.5);
  border-radius: 10px;
  font-size: 12px;
}
.footer-links a {
  color: gold;
  text-decoration: none;
  margin: 0 5px;
}
.footer-links a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="page-bg"></div>

<div class="header">
  <div class="logo">📞 PharaCoin</div>
</div>

<div class="section-title">تواصل معنا</div>

<div class="box">

  <div class="contact-icon">
    <i class="fa-brands fa-telegram"></i>
  </div>

  <div class="username" id="telegram">
    @PharacoinSupport
  </div>

  <button class="contact-btn" onclick="openTelegram()">
    فتح التليجرام
  </button>

  <button class="contact-btn" onclick="copyUser()" style="margin-top:10px;">
    نسخ اليوزر
  </button>

  <div class="note">
    اضغط على زر فتح التليجرام للتواصل مباشرة مع فريق الدعم
  </div>

</div>

<script>
function openTelegram(){
  window.open("https://t.me/PharacoinSupport", "_blank");
}

function copyUser(){
  navigator.clipboard.writeText("@PharacoinSupport");
  alert("تم نسخ اليوزر ✔");
}
</script>
<!-- روابط إضافية أسفل الصفحة -->
<div class="footer-links">
  <a href="convert.html">💱 تحويل العملات</a> |
  <a href="contact.html">📞 تواصل معنا</a> |
  <a href="about.html">ℹ️ من نحن</a> |
  <a href="faq.html">❓ الأسئلة الشائعة</a> |
  <a href="terms.html">📜 الشروط</a> |
  <a href="privacy.html">🔒 الخصوصية</a>
</div>
</body>
</html>
