<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- === تحسينات SEO محسنة === -->
    <title>تسجيل الدخول - PharaCoin | دخول آمن إلى حسابك</title>
    <meta name="description" content="سجل الدخول إلى حسابك في PharaCoin باستخدام البريد الإلكتروني أو رقم الهاتف. استمتع بتجربة آمنة وسلسة.">
    <meta name="keywords" content="PharaCoin, تسجيل الدخول, دخول, حساب, أمان">
    <meta name="author" content="PharaCoin Team">
    <meta name="robots" content="index, follow">

    <!-- === بطاقات المشاركة الاجتماعية (Open Graph / Twitter) === -->
    <!-- ====================== غير هذه الروابط ====================== -->
    <meta property="og:title" content="تسجيل الدخول - PharaCoin">
    <meta property="og:description" content="سجل الدخول إلى حسابك في PharaCoin بسهولة وأمان.">
    <!-- غير الرابط التالي إلى رابط الصورة التي تريد ظهورها عند المشاركة (مثل شعار الموقع) -->
    <meta property="og:image" content="https://yourdomain.com/og-image.jpg">   <!-- قم بتغيير yourdomain.com إلى نطاقك الفعلي وحدد مسار الصورة -->
    <!-- غير الرابط التالي إلى رابط هذه الصفحة على موقعك الفعلي -->
    <meta property="og:url" content="https://yourdomain.com/login.html">       <!-- غيّر yourdomain.com إلى اسم موقعك -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PharaCoin">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="تسجيل الدخول - PharaCoin">
    <meta name="twitter:description" content="سجل الدخول إلى حسابك في PharaCoin بسهولة وأمان.">
    <!-- غير الرابط التالي إلى رابط الصورة المخصصة لتويتر (يمكن أن تكون نفس الصورة أعلاه) -->
    <meta name="twitter:image" content="https://yourdomain.com/twitter-image.jpg"> <!-- غيّر yourdomain.com ومسار الصورة -->
    <meta name="twitter:site" content="@PharaCoinApp">                         <!-- غيّر @PharaCoinApp إلى حساب تويتر الخاص بك إن وجد -->
    <!-- ================================================================= -->

    <!-- === الرابط الأساسي (Canonical) === -->
    <!-- غيّر الرابط التالي إلى رابط هذه الصفحة على موقعك الفعلي -->
    <link rel="canonical" href="https://yourdomain.com/login.html">   <!-- غيّر yourdomain.com إلى نطاقك -->

    <!-- === البيانات المنظمة (Structured Data) لصفحة تسجيل الدخول === -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "تسجيل الدخول - PharaCoin",
        "description": "صفحة تسجيل الدخول إلى حساب المستخدم في منصة PharaCoin.",
        "url": "https://yourdomain.com/login.html",          <!-- غيّر yourdomain.com -->
        "isPartOf": {
            "@type": "WebSite",
            "name": "PharaCoin",
            "url": "https://yourdomain.com"                   <!-- غيّر yourdomain.com -->
        }
    }
    </script>

    <!-- الخطوط والأنماط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Firebase SDK (ثابت) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        body{
          font-family:'Cairo',sans-serif;
          background:#000;
          color:#fff;
          max-width:480px;
          margin:auto;
        }

        /* الخلفية */
        .page-bg{
          position:fixed;
          inset:0;
          background:url("Object/qa.jpg") center/cover no-repeat;
          filter:brightness(0.25) saturate(1.2);
          z-index:-1;
        }

        /* الهيدر */
        .header{
          display:flex;
          justify-content:center;
          align-items:center;
          padding:16px;
          background:rgba(0,0,0,0.85);
          border-bottom:1px solid rgba(255,0,0,0.4);
          backdrop-filter:blur(10px);
        }
        .header h1{
          color:red;
          font-weight:900;
          font-size:18px;
          text-shadow:0 0 10px red,0 0 25px darkred;
          margin:0;
        }

        /* صندوق الدخول */
        .login-box{
          margin:40px 16px;
          padding:22px;
          background:rgba(0,0,0,0.65);
          border-radius:20px;
          border:1px solid rgba(255,0,0,0.4);
          box-shadow:0 0 30px rgba(0,0,0,0.7);
        }

        .login-box h2{
          text-align:center;
          color:red;
          margin-bottom:18px;
          text-shadow:0 0 10px red,0 0 25px darkred;
        }

        .login-box input{
          width:100%;
          padding:12px;
          margin:10px 0;
          border:none;
          border-radius:10px;
          background:#111;
          color:#fff;
          font-size:14px;
        }

        /* كلمة المرور */
        .password-box{
          position:relative;
        }
        .password-box span{
          position:absolute;
          left:10px;
          top:50%;
          transform:translateY(-50%);
          cursor:pointer;
          color:gold;
          font-size:12px;
        }

        /* الخيارات */
        .options{
          display:flex;
          justify-content:space-between;
          align-items:center;
          font-size:12px;
          margin-top:6px;
        }
        .options label{
          display:flex;
          align-items:center;
          gap:5px;
        }
        .options a{
          color:gold;
          text-decoration:none;
        }

        /* زر الدخول */
        .login-box button{
          width:100%;
          padding:12px;
          margin-top:15px;
          border:none;
          border-radius:12px;
          background:red;
          color:white;
          font-weight:bold;
          font-size:15px;
          cursor:pointer;
          box-shadow:0 0 15px white,0 0 30px red,0 0 60px darkred;
        }

        .login-box button:hover{
          transform:scale(1.03);
          box-shadow:0 0 25px white,0 0 60px red,0 0 100px darkred;
        }

        .register-link{
          margin-top:15px;
          text-align:center;
          font-size:13px;
        }
        .register-link a{
          color:gold;
          text-decoration:none;
        }
    </style>
</head>
<body>

<div class="page-bg"></div>

<div class="header">
  <h1>🔥 PharaCoin</h1>
</div>

<div class="login-box">

<h2>تسجيل الدخول</h2>

<form id="loginForm">

  <label for="email" class="visually-hidden" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;">البريد الإلكتروني أو رقم الهاتف</label>
  <input type="text" id="email" placeholder="رقم الموبايل أو الجيميل" required aria-label="البريد الإلكتروني أو رقم الهاتف">

  <div class="password-box">
    <label for="password" class="visually-hidden" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;">كلمة المرور</label>
    <input type="password" id="password" placeholder="كلمة المرور" required aria-label="كلمة المرور">
    <span onclick="togglePassword()" role="button" tabindex="0" aria-label="إظهار/إخفاء كلمة المرور">إظهار</span>
  </div>

  <div class="options">
    <label>
      <input type="checkbox"> تذكرني
    </label>
    <a href="#" aria-label="نسيت كلمة المرور؟">نسيت كلمة المرور؟</a>
  </div>

  <button type="submit" aria-label="تسجيل الدخول">دخول</button>

</form>

<div class="register-link">
  ليس لديك حساب؟ <a href="register.html" aria-label="إنشاء حساب جديد">إنشاء حساب</a>
</div>

</div>

<script>
// تهيئة Firebase
firebase.initializeApp({
  apiKey: "AIzaSyB78JT_cbPMizvzKWBrQoQUe3-zukHrr1U",
  authDomain: "pharacoin.firebaseapp.com",
  projectId: "pharacoin"
});

const auth = firebase.auth();
const db = firebase.firestore();

function togglePassword(){
  var pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
  var span = event.currentTarget;
  span.innerText = pass.type === "password" ? "إظهار" : "إخفاء";
}

/* ملء البيانات تلقائياً */
window.onload = function(){
  document.getElementById("email").value = localStorage.getItem("loginEmail") || "";
  document.getElementById("password").value = localStorage.getItem("loginPass") || "";
}

/* تسجيل الدخول */
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then((userCredential)=>{
      const user = userCredential.user;

      db.collection("users").doc(user.uid).get().then((doc)=>{
        if(doc.exists){
          localStorage.setItem("profileName", doc.data().username);
          localStorage.setItem("profileEmail", doc.data().emailOrPhone);
        }
        // تم التعديل هنا: التحويل إلى dashboard.html بدلاً من profile.html
        window.location.href = "dashboard.html";
      });
    })
    .catch(error => {
      alert(error.message);
    });
});
</script>

<!-- الأجزاء التي تحتاج تغيير (تلخيص) -->
<!--
  1. روابط الصور الاجتماعية (og:image, twitter:image) استبدل yourdomain.com بالرابط الفعلي لصورك.
  2. روابط URL (og:url, canonical, JSON-LD) استبدل yourdomain.com بنطاق موقعك.
  3. حساب تويتر (twitter:site) غيّره إلى حسابك أو احذفه.
  4. إعدادات Firebase (apiKey, authDomain, projectId) تأكد من أنها صحيحة لمشروعك.
-->
</body>
</html>
