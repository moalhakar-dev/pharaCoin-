    <style>
        /* نفس التنسيقات السابقة */

        html,body{
          overflow-x:hidden;width:100%;

        body{

        .page-bg{
          position:fixed;inset:0;

        .page-bg::after{
          content:'';position:absolute;inset:0;
          background:linear-gradient(180deg,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.8) 100%);

        .header{
          display:flex;justify-content:space-between;align-items:center;
          padding:16px 18px;
          position:sticky;top:0;z-index:50;
          background:rgba(0,0,0,0.85);

          backdrop-filter:blur(15px);
        }
        .logo{
          display:flex;align-items:center;gap:8px;
          color:gold;font-weight:800;font-size:17px;
          text-shadow:0 0 10px rgba(255,215,0,0.3);
        }
        .balance-box{
          display:flex;align-items:center;gap:8px;
          background:rgba(255,215,0,0.08);
          border:1px solid rgba(255,215,0,0.25);
          padding:6px 14px;border-radius:20px;
          font-size:13px;font-weight:700;
          backdrop-filter:blur(5px);
        }
        .balance-coin{
          width:22px;height:22px;border-radius:50%;
          background:linear-gradient(135deg,#FFD700,#FFA500);
          display:flex;align-items:center;justify-content:center;
          font-size:11px;
          box-shadow:0 0 8px rgba(255,215,0,0.4);
          animation:coinSpin 3s linear infinite;
        }
        @keyframes coinSpin{0%{transform:rotateY(0);}100%{transform:rotateY(360deg);}}
        .container{
          margin:20px 16px;
          background:rgba(0,0,0,0.6);
          border:1px solid rgba(255,215,0,0.15);
          border-radius:20px;
          padding:24px;
          backdrop-filter:blur(10px);
        }
        /* تم تغيير العنوان إلى h1 مع الحفاظ على التنسيق */
        h1.title{
          text-align:center;
          font-size:20px;
          font-weight:900;
          color:gold;
          margin-bottom:16px;
        }
        .balance-row{
          display:flex;
          justify-content:space-between;
          align-items:center;
          background:rgba(255,215,0,0.08);
          border-radius:12px;
          padding:12px 16px;
          margin:8px 0;
          border:1px solid rgba(255,215,0,0.2);
        }
        .balance-label{
          font-weight:600;
          color:gold;
        }
        .balance-value{
          font-size:18px;
          font-weight:800;
          background:rgba(255,215,0,0.15);
          padding:4px 12px;
          border-radius:20px;
        }
        .input-group{
          margin:20px 0;
        }
        .input-group label{
          display:block;
          margin-bottom:8px;
          color:gold;
          font-weight:600;
        }
        .input-group input, .input-group select{
          width:100%;
          padding:16px;
          background:rgba(0,0,0,0.5);
          border:2px solid rgba(255,215,0,0.2);
          border-radius:16px;
          font-size:16px;
          color:#fff;
          font-family:'Cairo',sans-serif;
        }
        .input-group input:focus, .input-group select:focus{
          outline:none;
          border-color:gold;
          box-shadow:0 0 20px rgba(255,215,0,0.2);
        }
        .input-group select{
          text-align:right;
          cursor:pointer;
        }
        .input-group select option{
          background:#1a1a1a;
          color:#fff;
        }
        .btn{
          width:100%;
          padding:16px;
          background:linear-gradient(135deg,#FFD700,#FFA500);
          border:none;
          border-radius:50px;
          font-weight:900;
          font-size:16px;
          color:#000;
          cursor:pointer;
          transition:0.3s;
          margin:8px 0;
          box-shadow:0 4px 15px rgba(255,215,0,0.4);
        }
        .btn:hover{
          transform:translateY(-2px);
          box-shadow:0 8px 25px rgba(255,215,0,0.6);
        }
        .btn.secondary{
          background:linear-gradient(135deg,#555,#333);
          color:gold;
        }
        .error-msg{
          color:#ff4444;
          text-align:center;
          margin:16px 0;
          font-weight:700;
        }
        .success-msg{
          color:#00ff9d;
          text-align:center;
          margin:16px 0;
          font-weight:700;
        }

        /* ===== التصميم الجديد للـ Navbar بالرموز المصرية ===== */
        .bottom-nav{
          position:fixed;bottom:0;left:0;right:0;
          max-width:480px;margin:0 auto;
          background:linear-gradient(180deg, #8b1a1a, #6a0d0d); /* أحمر داكن فرعوني */
          display:flex;justify-content:space-around;
          padding:10px 0 18px;
          border-top: 3px solid #e6b422; /* ذهبي */
          box-shadow: 0 -5px 20px rgba(0,0,0,0.8), 0 0 15px #b8860b;
          backdrop-filter:blur(15px);
          z-index:100;
        }

        .nav-item{
          text-align:center;
          cursor:pointer;
          display:flex;
          flex-direction:column;
          align-items:center;
          gap:4px;
          transition:transform 0.2s;
          width: 70px;
          position: relative;
        }
        .nav-item:active{transform:scale(0.95);}

        .nav-circle{
          width:55px;
          height:55px;
          border-radius:50%;
          background: #1a0e0e; /* أسود محمر */
          border: 2px solid #b22222; /* إطار أحمر */
          display: flex;
          justify-content: center;
          align-items: center;
          font-size: 30px;
          color: #b22222; /* أحمر فرعوني */
          margin: 0 auto 4px;
          transition: all 0.3s ease;
          box-shadow: 0 0 10px rgba(180, 40, 40, 0.6);
        }

        /* العنصر النشط (الصفحة الحالية) - لونه أصفر مع نبض */
        .nav-item.current-page .nav-circle{
          color: #FFD700; /* ذهبي */
          border-color: #FFD700; /* إطار ذهبي */
          box-shadow: 0 0 15px #FFD700;
          animation: pulse 1.5s infinite;
        }

        @keyframes pulse{
          0%{box-shadow:0 0 5px #FFD700;}
          50%{box-shadow:0 0 20px #FFD700;}
          100%{box-shadow:0 0 5px #FFD700;}
        }

        /* النص أسفل الدائرة - يظهر فقط أثناء الـ 3 ثوان */
        .nav-label{
          font-size: 11px;
          font-weight: 700;
          color: #ffdb8e;
          text-shadow: 0 0 5px #b8860b;
          display: none;
          height: 16px;
          margin-top: 2px;
        }

        .nav-item.showing .nav-label{
          display: block;
        }
    </style>

<body>

<div class="page-bg"></div>
<div class="header">
  <div class="logo">🏺 PharaCoin</div>
  <div class="balance-box">💰 <span id="headerCoins">0</span> 🪙</div>
</div>

<div class="container">
  <!-- تم تغيير العنوان إلى h1 مع الحفاظ على الكلاس -->
  <h1 class="title">💰 سحب الأموال</h1>

  <div class="balance-row">
    <span class="balance-label">💵 رصيدك القابل للسحب</span>
    <span class="balance-value" id="fiatBalance">0.00</span>
  </div>

  <div class="input-group">
    <label for="withdrawMethod">طريقة السحب</label>
    <select id="withdrawMethod">
      <option value="vodafone">فودافون كاش</option>
      <option value="etisalat">اتصالات كاش</option>
      <option value="orange">أورنج كاش</option>
      <option value="binance">Binance</option>
      <option value="okx">OKX</option>
    </select>
  </div>

  <div class="input-group">
    <label for="accountAddress">العنوان / رقم المحفظة</label>
    <input type="text" id="accountAddress" placeholder="أدخل رقم المحفظة أو العنوان">
  </div>

  <div class="input-group">
    <label for="withdrawAmount">المبلغ المراد سحبه (بالدولار)</label>
    <input type="number" id="withdrawAmount" placeholder="المبلغ" min="10" step="0.01">
    <div style="color: #FFD700; font-size: 13px; margin-top: 5px;">* الحد الأدنى 10 دولار (≈ 500 جنيه مصري)</div>
  </div>

  <div id="withdrawError" class="error-msg"></div>
  <div id="withdrawSuccess" class="success-msg"></div>

  <button class="btn" id="withdrawConfirmBtn">تأكيد السحب</button>
  <button class="btn secondary" onclick="window.location.href='convert.html'">🔙 العودة للتحويل</button>
  <button class="btn secondary" onclick="window.location.href='transactions.html'">📋 سجل المعاملات</button>
</div>

<!-- Bottom Nav بالرموز المصرية مع إضافة aria-labels -->
<div class="bottom-nav">
  <div class="nav-item" data-url="dashboard.html" data-label="الرئيسية" data-egypt="𓂀" data-alt="🏠" aria-label="الصفحة الرئيسية">
    <div class="nav-circle">𓂀</div>
    <div class="nav-label">الرئيسية</div>
  </div>
  <div class="nav-item" data-url="museum.html" data-label="المتحف" data-egypt="𓆣" data-alt="🏺" aria-label="صفحة المتحف">
    <div class="nav-circle">𓆣</div>
    <div class="nav-label">المتحف</div>
  </div>
  <div class="nav-item" data-url="statue-builder.html" data-label="التجميع" data-egypt="𓁹" data-alt="⚒️" aria-label="صفحة تجميع التماثيل">
    <div class="nav-circle">𓁹</div>
    <div class="nav-label">التجميع</div>
  </div>
  <!-- الصفحة الحالية: حسابي (لأن السحب جزء من حسابي) -->
  <div class="nav-item current-page" data-url="profile.html" data-label="حسابي" data-egypt="☥" data-alt="👤" aria-label="الصفحة الشخصية">
    <div class="nav-circle">☥</div>
    <div class="nav-label">حسابي</div>
  </div>
</div>

<script>
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();
function playClick() {
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(700, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1100, audioCtx.currentTime + 0.08);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    o.start(); o.stop(audioCtx.currentTime + 0.12);
  } catch (e) {}
}

function addTransaction(type, amount, currency, status = 'pending') {
  let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
  transactions.push({
    type: type,
    amount: amount,
    currency: currency,
    status: status,
    date: new Date().toISOString()
  });
  localStorage.setItem('transactions', JSON.stringify(transactions));
}

let fiatBalance = parseFloat(localStorage.getItem('fiatBalance') || '0');
document.getElementById('headerCoins').innerText = localStorage.getItem('coins') || '0';
document.getElementById('fiatBalance').innerText = fiatBalance.toFixed(2);

document.getElementById('withdrawConfirmBtn').addEventListener('click', function() {
  playClick();
  const amount = parseFloat(document.getElementById('withdrawAmount').value) || 0;
  const address = document.getElementById('accountAddress').value.trim();
  const method = document.getElementById('withdrawMethod').value;
  const methodName = document.getElementById('withdrawMethod').selectedOptions[0].text;

  if (!address) {
    document.getElementById('withdrawError').innerText = '❌ الرجاء إدخال تفاصيل السحب';
    document.getElementById('withdrawSuccess').innerText = '';
    return;
  }
  if (amount <= 0) {
    document.getElementById('withdrawError').innerText = '❌ المبلغ غير صالح';
    document.getElementById('withdrawSuccess').innerText = '';
    return;
  }
  // التحقق من الحد الأدنى 10 دولار
  if (amount < 10) {
    document.getElementById('withdrawError').innerText = '❌ الحد الأدنى للسحب هو 10 دولار (≈ 500 جنيه مصري)';
    document.getElementById('withdrawSuccess').innerText = '';
    return;
  }
  if (amount > fiatBalance) {
    document.getElementById('withdrawError').innerText = '❌ رصيد غير كافٍ';
    document.getElementById('withdrawSuccess').innerText = '';
    return;
  }

  fiatBalance -= amount;
  localStorage.setItem('fiatBalance', fiatBalance.toFixed(2));
  document.getElementById('fiatBalance').innerText = fiatBalance.toFixed(2);
  document.getElementById('withdrawError').innerText = '';
  document.getElementById('withdrawSuccess').innerHTML = `✅ تم طلب السحب بنجاح!<br>المبلغ: ${amount.toFixed(2)} دولار<br>طريقة السحب: ${methodName}<br>سيتم معالجتها خلال 24 ساعة.`;
  document.getElementById('accountAddress').value = '';
  document.getElementById('withdrawAmount').value = '';

  addTransaction('withdraw', amount, 'USD', 'pending');
  setTimeout(() => { window.location.href = 'transactions.html'; }, 2000);
});

// ===== آلية النقر الجديدة للـ Navbar =====
const navItems = document.querySelectorAll('.nav-item');

// مصفوفة لتخزين حالة "تم عرض التأثير" لكل عنصر
let effectShown = new Array(navItems.length).fill(false);
let timerId = null;
let currentItem = null;

// دالة لعرض التأثير (تغيير الرمز وإظهار النص)
function showEffect(item) {
  // إذا كان العنصر هو الصفحة الحالية، لا نفعل شيئاً
  if (item.classList.contains('current-page')) return;
  
  // إذا كان هناك تأثير سابق قيد العرض، نلغيه
  if (timerId) {
    clearTimeout(timerId);
    timerId = null;
    if (currentItem) {
      const oldCircle = currentItem.querySelector('.nav-circle');
      const oldEgypt = currentItem.dataset.egypt;
      oldCircle.textContent = oldEgypt;
      currentItem.classList.remove('showing');
    }
  }
  
  // تعيين العنصر الحالي وعرض التأثير
  currentItem = item;
  const circle = item.querySelector('.nav-circle');
  const altSymbol = item.dataset.alt;
  circle.textContent = altSymbol;
  item.classList.add('showing');
  
  // مؤقت لإعادة الرمز المصري بعد 3 ثوان
  timerId = setTimeout(() => {
    const circle = currentItem.querySelector('.nav-circle');
    const egyptSymbol = currentItem.dataset.egypt;
    circle.textContent = egyptSymbol;
    currentItem.classList.remove('showing');
    
    timerId = null;
    currentItem = null;
  }, 3000);
}

// معالج النقر لكل عنصر
navItems.forEach((item, index) => {
  item.addEventListener('click', function(e) {
    e.stopPropagation();
    playClick(); // استخدام دالة الصوت
    
    // إذا كان العنصر هو الصفحة الحالية، لا ننقل
    if (this.classList.contains('current-page')) return;
    
    // إذا كان التأثير قد ظهر من قبل لهذا العنصر (أي هذه هي الضغطة الثانية) → ننتقل
    if (effectShown[index]) {
      window.location.href = this.dataset.url;
      return;
    }
    
    // وإلا (أول ضغطة) → نعرض التأثير ونسجل أنه تم عرضه
    showEffect(this);
    effectShown[index] = true;
  });
});
</script>
</body>
