<html lang="ar" dir="rtl">
<head>

    <meta name="keywords" content="PharaCoin, ملف شخصي, حسابي, رصيد, مستوى, VIP, تغيير كلمة المرور">
    <meta name="author" content="PharaCoin Team">

    <!-- === بطاقات المشاركة الاجتماعية (Open Graph / Twitter) === -->

    <meta property="og:title" content="الملف الشخصي - PharaCoin">
    <meta property="og:description" content="صفحة الملف الشخصي في PharaCoin: بيانات حسابك وإعداداتك.">
    <!-- غير الرابط التالي إلى رابط الصورة التي تريد ظهورها عند المشاركة (مثل شعار الموقع) -->
    <meta property="og:image" content="https://yourdomain.com/og-image.jpg">   <!-- قم بتغيير yourdomain.com إلى نطاقك الفعلي وحدد مسار الصورة -->
    <!-- غير الرابط التالي إلى رابط هذه الصفحة على موقعك الفعلي -->
    <meta property="og:url" content="https://yourdomain.com/profile.html">      <!-- غيّر yourdomain.com إلى اسم موقعك -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PharaCoin">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="الملف الشخصي - PharaCoin">
    <meta name="twitter:description" content="صفحة الملف الشخصي في PharaCoin: بيانات حسابك وإعداداتك.">
    <!-- غير الرابط التالي إلى رابط الصورة المخصصة لتويتر (يمكن أن تكون نفس الصورة أعلاه) -->
    <meta name="twitter:image" content="https://yourdomain.com/twitter-image.jpg"> <!-- غيّر yourdomain.com ومسار الصورة -->
    <meta name="twitter:site" content="@PharaCoinApp">                         <!-- غيّر @PharaCoinApp إلى حساب تويتر الخاص بك إن وجد -->
    <!-- ================================================================= -->

    <!-- === الرابط الأساسي (Canonical) === -->
    <!-- غيّر الرابط التالي إلى رابط هذه الصفحة على موقعك الفعلي -->
    <link rel="canonical" href="https://yourdomain.com/profile.html">   <!-- غيّر yourdomain.com إلى نطاقك -->

    <!-- === البيانات المنظمة (Structured Data) لصفحة الملف الشخصي === -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ProfilePage",
        "name": "الملف الشخصي - PharaCoin",
        "description": "صفحة الملف الشخصي للمستخدم في منصة PharaCoin.",
        "url": "https://yourdomain.com/profile.html",          <!-- غيّر yourdomain.com -->
        "isPartOf": {
            "@type": "WebSite",
            "name": "PharaCoin",
            "url": "https://yourdomain.com"                   <!-- غيّر yourdomain.com -->
        }
    }
    </script>

    <!-- الخطوط والأنماط (ثابت) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Firebase SDK (ثابت) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}

        body{
          font-family:'Cairo',sans-serif;
          background:url("Object/qa.jpg") no-repeat center center fixed;
          background-size:cover;
          color:white;
          max-width:420px;
          margin:auto;
        }

        body::before{
          content:"";
          position:fixed;
          inset:0;
          background:rgba(0,0,0,0.85);
          z-index:-1;
        }

        /* ===== Header ===== */
        .header{
          position:sticky;
          top:0;
          display:flex;
          justify-content:space-between;
          align-items:center;
          padding:15px;
          background:rgba(0,0,0,0.9);
          border-bottom:1px solid rgba(255,0,0,0.4);
          backdrop-filter:blur(10px);
          z-index:10;
        }

        .header h1{
          font-size:18px;
          font-weight:900;
          color:#ff0000;
          text-shadow:0 0 15px #ff0000;
          margin:0;
        }

        .back{
          font-size:13px;
          color:#00ffcc;
          cursor:pointer;
        }

        /* ===== Container ===== */
        .container{
          padding:15px;
          display:flex;
          flex-direction:column;
          gap:18px;
        }

        /* ===== Card ===== */
        .card{
          background:rgba(0,0,0,0.7);
          border:2px solid #ff0000;
          border-radius:20px;
          padding:15px;
          box-shadow:0 0 15px rgba(255,0,0,0.6);
          transition: transform 0.2s, box-shadow 0.2s;
        }

        /* تنسيق خاص للبطاقات القابلة للنقر */
        .clickable-card {
          cursor: pointer;
        }
        .clickable-card:hover {
          transform: translateY(-2px);
          box-shadow: 0 0 20px #ff0000;
          border-color: #ff6600;
        }

        /* ===== Data ===== */
        .label{
          color:#ff0000;
          font-weight:bold;
          margin-bottom:6px;
        }

        .data-box{
          background:#111;
          padding:12px;
          border-radius:12px;
          text-align:center;
          border:1px solid #ff0000;
          font-weight:bold;
          color:#00ffcc;
          margin-bottom:10px;
        }

        .progress-bar{
          height:12px;
          background:#1a1a1a;
          border-radius:10px;
          overflow:hidden;
          border:1px solid #ff0000;
          margin-bottom:10px;
        }
        .progress-fill{
          height:100%;
          background:#ff0000;
          width:0%;
          transition:0.5s;
        }

        input{
          width:100%;
          padding:14px;
          border-radius:12px;
          border:1px solid #ff0000;
          background:#0e0e0e;
          color:white;
          font-family:'Cairo',sans-serif;
          margin-bottom:10px;
        }

        button{
          width:100%;
          padding:12px;
          border:none;
          border-radius:15px;
          background:#ff0000;
          color:white;
          font-weight:bold;
          cursor:pointer;
          box-shadow:0 0 15px #ff0000;
          font-family:'Cairo',sans-serif;
          transition: background 0.2s;
        }
        button:hover{ background:#cc0000; }

        .policy-links{
          text-align:center;
          margin-top:10px;
        }
        .policy-links a{
          color:#00ff9d;
          font-weight:bold;
          text-decoration:none;
          margin:0 5px;
        }
        .policy-links a:hover{
          text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="header">
  <h1>👤 الملف الشخصي</h1>   <!-- تم تغيير div إلى h1 -->
  <div class="back" onclick="goBack()" aria-label="العودة للصفحة السابقة">⬅ رجوع</div>
</div>

<div class="container">

<div class="card">
  <div class="label">اسم المستخدم</div>
  <div class="data-box" id="username" aria-label="اسم المستخدم">...</div>

  <div class="label">رصيدك</div>
  <div class="data-box" id="coins" aria-label="الرصيد الحالي">...</div>

  <!-- بطاقة المستوى - قابلة للنقر -->
  <div class="card clickable-card" onclick="window.location.href='levels.html'" style="margin-top: 10px; padding: 10px;" aria-label="اضغط لعرض المستويات">
    <div class="label">المستوى</div>
    <div class="data-box" style="margin-bottom: 5px;">Level <span id="level">1</span></div>
    <div class="progress-bar">
      <div class="progress-fill" id="xpBar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
    </div>
    <div style="color:#ff9900; font-size:12px; margin-top:5px;">اضغط لعرض كل المستويات</div>
  </div>
</div>

<!-- بطاقة VIP - قابلة للنقر -->
<div class="card clickable-card" onclick="window.location.href='vip.html'" aria-label="اضغط للترقية أو تفعيل الاشتراك VIP">
  <div class="label">عضوية VIP</div>
  <div class="data-box" id="vipStatus">جارِ التحميل...</div>
  <div style="color:#ff9900; font-size:12px; text-align:center;">اضغط للترقية أو تفعيل الاشتراك</div>
</div>

<div class="card">
  <div class="label">البريد الإلكتروني</div>
  <div class="data-box" id="userContact">...</div>
</div>

<div class="card">
  <div class="label">تغيير كلمة المرور</div>
  <label for="newpass" class="visually-hidden" style="position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;">كلمة المرور الجديدة</label>
  <input type="password" placeholder="كلمة المرور الجديدة" id="newpass" aria-label="كلمة المرور الجديدة">
  <button onclick="savePass()" aria-label="حفظ كلمة المرور الجديدة">حفظ التغيير</button>
</div>

<div class="card">
  <button onclick="logout()" aria-label="تسجيل الخروج من الحساب">🚪 تسجيل خروج</button>
</div>

<div class="policy-links">
  <a href="terms.html" title="شروط الاستخدام">📜 الشروط</a> |
  <a href="privacy.html" title="سياسة الخصوصية">🔒 الخصوصية</a>
</div>

</div>

<script>
// تهيئة Firebase - يفضل وضع هذه القيم في متغيرات بيئة حقيقية
// ====================== غير هذه القيم حسب مشروعك الفعلي ======================
firebase.initializeApp({
  apiKey: "AIzaSyB78JT_cbPMizvzKWBrQoQUe3-zukHrr1U",   // غيّر إذا لزم الأمر
  authDomain: "pharacoin.firebaseapp.com",             // غيّر إذا لزم الأمر
  projectId: "pharacoin"                               // غيّر إذا لزم الأمر
});
// =============================================================================

const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(function(user){
  if(user){
    db.collection("users").doc(user.uid).get().then((doc)=>{
      if(doc.exists){
        const data = doc.data();
        document.getElementById("username").innerText = data.username || "غير متوفر";
        document.getElementById("coins").innerText = (data.balance || 0) + " جنيه";
        document.getElementById("userContact").innerText = data.email || user.email || "غير متوفر";

        let xp = data.xp || 0;
        let level = Math.floor(xp / 100) + 1;
        let progress = xp % 100;

        document.getElementById("level").innerText = level;
        document.getElementById("xpBar").style.width = progress + "%";
        document.getElementById("xpBar").setAttribute("aria-valuenow", progress);
      }
    });

    let vip = localStorage.getItem("vipPlan");
    let expire = localStorage.getItem("vipExpire");

    if(vip && expire && new Date(expire) > new Date()){
      let days = Math.ceil((new Date(expire) - new Date()) / (1000*60*60*24));
      document.getElementById("vipStatus").innerHTML =
        "👑 مشترك في "+vip+"<br>ينتهي خلال "+days+" يوم";
    }else{
      document.getElementById("vipStatus").innerText = "لا يوجد اشتراك VIP";
    }

  }else{
    window.location.href="login.html";
  }
});

function savePass(){
  const newPass = document.getElementById("newpass").value;
  if(newPass.length < 6){
    alert("كلمة المرور لازم تكون 6 أحرف على الأقل");
    return;
  }
  auth.currentUser.updatePassword(newPass)
  .then(()=> alert("تم تغيير كلمة المرور بنجاح 🔥"))
  .catch(error=> alert(error.message));
}

function logout(){
  auth.signOut().then(()=> window.location.href="login.html");
}

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    location.href="dashboard.html";
  }
}
</script>

<!-- الأجزاء التي تحتاج تغيير (تلخيص) -->
<!--
  1. روابط الصور الاجتماعية (og:image, twitter:image) استبدل yourdomain.com بالرابط الفعلي لصورك.
  2. روابط URL (og:url, canonical, JSON-LD) استبدل yourdomain.com بنطاق موقعك.
  3. حساب تويتر (twitter:site) غيّره إلى حسابك أو احذفه.
  4. إعدادات Firebase (apiKey, authDomain, projectId) تأكد من أنها صحيحة لمشروعك.
-->
</body>
</html>
