<script>
// تعريف الصوت
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();
function playClick() {
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(700, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1100, audioCtx.currentTime + 0.08);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    o.start(); o.stop(audioCtx.currentTime + 0.12);
  } catch (e) {}
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const icons = { success: '✅', error: '❌', info: '🔮' };
  t.innerHTML = (icons[type] || '✅') + ' ' + msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function addTransaction(type, amount, currency, status = 'completed') {
  let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
  transactions.push({
    type: type,
    amount: amount,
    currency: currency,
    status: status,
    date: new Date().toISOString()
  });
  localStorage.setItem('transactions', JSON.stringify(transactions));
}

// تحميل الأرصدة
let coins = parseInt(localStorage.getItem('coins') || '500');
let pharaCoin = parseInt(localStorage.getItem('pharaCoin') || '0');
let fiatBalance = parseFloat(localStorage.getItem('fiatBalance') || '0');

const USD_RATE = 0.10;
const EGP_RATE = 2.0;

function updateUI() {
  document.getElementById('headerCoins').innerText = coins;
  document.getElementById('coinsBalance').innerText = coins;
  document.getElementById('pharaBalance').innerText = pharaCoin;
  document.getElementById('fiatBalance').innerText = fiatBalance.toFixed(2);
  document.getElementById('withdrawBtn').style.display = fiatBalance > 0 ? 'block' : 'none';
}

function updateCoinResult() {
  let amount = parseInt(document.getElementById('amountInput').value) || 0;
  document.getElementById('resultPhara').innerText = Math.floor(amount / 10);
}

function updateFiatResult() {
  let amount = parseInt(document.getElementById('pharaToFiatInput').value) || 0;
  const currency = document.querySelector('input[name="currency"]:checked').value;
  let rate = currency === 'USD' ? USD_RATE : EGP_RATE;
  document.getElementById('resultFiat').innerText = (amount * rate).toFixed(2);
  document.getElementById('resultCurrency').innerText = currency === 'USD' ? 'دولار' : 'جنيه';
}

// تحويل Coins → PharaCoin
document.getElementById('convertBtn').addEventListener('click', function() {
  playClick();
  let amount = parseInt(document.getElementById('amountInput').value) || 0;
  if (amount < 10) return showError('❌ الحد الأدنى 10 Coins');
  if (amount % 10 !== 0) return showError('❌ المبلغ يجب أن يكون من مضاعفات 10');
  if (amount > coins) return showError('❌ رصيد Coins غير كافٍ');

  coins -= amount;
  pharaCoin += amount / 10;
  localStorage.setItem('coins', coins);
  localStorage.setItem('pharaCoin', pharaCoin);
  updateUI();
  document.getElementById('amountInput').value = 10;
  updateCoinResult();
  document.getElementById('errorMsg').innerText = '';
  document.getElementById('successMsg').innerText = `✅ تم التحويل! حصلت على ${amount/10} PharaCoin`;
  showToast(`تم التحويل`, 'success');
  addTransaction('convert', amount, 'Coins', 'completed');
  setTimeout(() => window.location.href = 'transactions.html', 1500);
});

// تحويل PharaCoin → عملة حقيقية
document.getElementById('convertToFiatBtn').addEventListener('click', function() {
  playClick();
  let amount = parseInt(document.getElementById('pharaToFiatInput').value) || 0;
  if (amount < 1) return showFiatError('❌ الحد الأدنى 1 PharaCoin');
    if (amount > pharaCoin) return showFiatError('❌ رصيد PharaCoin غير كافٍ');

  const currency = document.querySelector('input[name="currency"]:checked').value;
  let rate = currency === 'USD' ? USD_RATE : EGP_RATE;
  let fiatGained = amount * rate;

  pharaCoin -= amount;
  fiatBalance += fiatGained;
  localStorage.setItem('pharaCoin', pharaCoin);
  localStorage.setItem('fiatBalance', fiatBalance.toFixed(2));
  updateUI();
  document.getElementById('pharaToFiatInput').value = 1;
  updateFiatResult();
  document.getElementById('fiatErrorMsg').innerText = '';
  document.getElementById('fiatSuccessMsg').innerText = `✅ تم التحويل! رصيدك: ${fiatBalance.toFixed(2)} ${currency}`;
  showToast(`تم التحويل إلى ${currency}`, 'success');
  addTransaction('convert', amount, currency, 'completed');
  setTimeout(() => window.location.href = 'transactions.html', 1500);
});

function showError(msg) {
  document.getElementById('errorMsg').innerText = msg;
  document.getElementById('successMsg').innerText = '';
}
function showFiatError(msg) {
  document.getElementById('fiatErrorMsg').innerText = msg;
  document.getElementById('fiatSuccessMsg').innerText = '';
}

// أحداث الإدخال
document.getElementById('amountInput').addEventListener('input', updateCoinResult);
document.getElementById('pharaToFiatInput').addEventListener('input', updateFiatResult);
document.querySelectorAll('input[name="currency"]').forEach(radio => {
  radio.addEventListener('change', function() {
    updateFiatResult();
    document.getElementById('fiatRateDisplay').innerText = `1 👑 = ${this.value === 'USD' ? '0.10 دولار' : '2.00 جنيه'}`;
  });
});

// زر السحب
document.getElementById('withdrawBtn').addEventListener('click', function() {
  playClick();
  window.location.href = 'withdraw.html';
});

// ===== آلية النقر الجديدة للـ Navbar =====
const navItems = document.querySelectorAll('.nav-item');

// تحديد الصفحة الحالية (convert.html) - لا يوجد عنصر مطابق، لذا لا نضيف current-page لأي عنصر

// مصفوفة لتخزين حالة "تم عرض التأثير" لكل عنصر
let effectShown = new Array(navItems.length).fill(false);
let timerId = null;
let currentItem = null;

// دالة لعرض التأثير (تغيير الرمز وإظهار النص)
function showEffect(item) {
  // إذا كان العنصر هو الصفحة الحالية، لا نفعل شيئاً
  if (item.classList.contains('current-page')) return;
  
  // إذا كان هناك تأثير سابق قيد العرض، نلغيه
  if (timerId) {
    clearTimeout(timerId);
    timerId = null;
    if (currentItem) {
      const oldCircle = currentItem.querySelector('.nav-circle');
      const oldEgypt = currentItem.dataset.egypt;
      oldCircle.textContent = oldEgypt;
      currentItem.classList.remove('showing');
    }
  }
  
  // تعيين العنصر الحالي وعرض التأثير
  currentItem = item;
  const circle = item.querySelector('.nav-circle');
  const altSymbol = item.dataset.alt;
  circle.textContent = altSymbol;
  item.classList.add('showing');
  
  // مؤقت لإعادة الرمز المصري بعد 3 ثوان
  timerId = setTimeout(() => {
    const circle = currentItem.querySelector('.nav-circle');
    const egyptSymbol = currentItem.dataset.egypt;
    circle.textContent = egyptSymbol;
    currentItem.classList.remove('showing');
    
    timerId = null;
    currentItem = null;
  }, 3000);
}

// معالج النقر لكل عنصر
navItems.forEach((item, index) => {
  item.addEventListener('click', function(e) {
    e.stopPropagation();
    playClick();
    
    // إذا كان العنصر هو الصفحة الحالية، لا ننقل
    if (this.classList.contains('current-page')) return;
    
    // إذا كان التأثير قد ظهر من قبل لهذا العنصر (أي هذه هي الضغطة الثانية) → ننتقل
    if (effectShown[index]) {
      window.location.href = this.dataset.url;
      return;
    }
    
    // وإلا (أول ضغطة) → نعرض التأثير ونسجل أنه تم عرضه
    showEffect(this);
    effectShown[index] = true;
  });
});

updateUI();
updateCoinResult();
updateFiatResult();

// الخلفية
const bg = document.getElementById('pageBg');
const localImg = "Object/qa.jpg";
const fallbackImg = "https://images.pexels.com/photos/3350783/pexels-photo-3350783.jpeg?auto=compress&cs=tinysrgb&w=1260";

const img = new Image();
img.onload = ()=> bg.style.backgroundImage = `url('${localImg}')`;
img.onerror = ()=> bg.style.backgroundImage = `url('${fallbackImg}')`;
img.src = localImg + "?v=" + Date.now();
</script>
