    <style>

<body>

<div class="header">
  <h1>📝 تسجيل حساب</h1>   <!-- تم تغيير div إلى h1 -->
  <div class="back" onclick="goBack()" aria-label="العودة للصفحة السابقة">⬅ رجوع</div>
</div>

<div class="overlay">

<div class="title">
  <div class="title-box">
    <div class="title-icons">☥ 𓂀 𓆣</div>
    <h2>سجل الآن واحصل على مكافأة فورية</h2>  <!-- تم تغيير h1 إلى h2 لتحسين التسلسل الهرمي -->
    <div>
      <span class="amount">100</span>
      <span class="currency">جنيهًا</span>
    </div>
  </div>
</div>

<div class="register-box">
<form id="registerForm">

<div class="input-group">
  <label for="username" class="visually-hidden" style="position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;">اسم المستخدم</label>
  <input type="text" id="username" placeholder="اسم المستخدم" required aria-label="اسم المستخدم">
</div>

<div class="input-group">
  <label for="emailOrPhone" class="visually-hidden" style="position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;">رقم الهاتف أو البريد الإلكتروني</label>
  <input type="text" id="emailOrPhone" placeholder="رقم الهاتف أو البريد الإلكتروني" required aria-label="رقم الهاتف أو البريد الإلكتروني">
</div>

<div class="input-group">
  <label for="password" class="visually-hidden" style="position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;">كلمة المرور</label>
  <input type="password" id="password" placeholder="كلمة المرور" required aria-label="كلمة المرور">
  <span class="eye" role="button" tabindex="0" aria-label="إظهار/إخفاء كلمة المرور">👁️</span>
  <div class="strength"><span></span></div>
</div>

<div class="input-group">
  <label for="confirmPassword" class="visually-hidden" style="position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;">تأكيد كلمة المرور</label>
  <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required aria-label="تأكيد كلمة المرور">
  <span class="eye" role="button" tabindex="0" aria-label="إظهار/إخفاء كلمة المرور">👁️</span>
</div>

<div class="terms-box">
  <input type="checkbox" required id="terms" aria-label="الموافقة على الشروط والأحكام">
  <label for="terms">
    أوافق على 
    <a href="terms.html">الشروط والأحكام</a>
    و
    <a href="privacy.html">سياسة الخصوصية</a>
  </label>
</div>

<button type="submit" aria-label="تسجيل الحساب">تسجيل الحساب</button>

</form>
</div>

</div>

<script>
document.querySelectorAll(".eye").forEach(function(eye){
  eye.addEventListener("click", function(){
    let input = this.parentElement.querySelector("input");
    if(input.type === "password"){
      input.type = "text";
      this.textContent = "🙈";
    }else{
      input.type = "password";
      this.textContent = "👁️";
    }
  });
  // إضافة دعم لوحة المفاتيح (Enter/Space)
  eye.addEventListener("keydown", function(e){
    if(e.key === "Enter" || e.key === " "){
      e.preventDefault();
      this.click();
    }
  });
});

const passwordInput = document.getElementById("password");
const strengthBar = document.querySelector(".strength span");

passwordInput.addEventListener("input", function(){
  let value = passwordInput.value;
  let strength = 0;
  if(value.length >= 6) strength++;
  if(/[A-Z]/.test(value)) strength++;
  if(/[0-9]/.test(value)) strength++;
  if(/[^A-Za-z0-9]/.test(value)) strength++;

  strengthBar.style.width = (strength*25)+"%";
  strengthBar.style.background = ["red","orange","gold","lime"][strength-1] || "red";
});

// تهيئة Firebase - يفضل وضع هذه القيم في متغيرات بيئة حقيقية
// ====================== غير هذه القيم حسب مشروعك الفعلي ======================
firebase.initializeApp({
  apiKey: "AIzaSyB78JT_cbPMizvzKWBrQoQUe3-zukHrr1U",   // غيّر إذا لزم الأمر
  authDomain: "pharacoin.firebaseapp.com",             // غيّر إذا لزم الأمر
  projectId: "pharacoin"                               // غيّر إذا لزم الأمر
});
// =============================================================================

const auth = firebase.auth();
const db = firebase.firestore();

document.getElementById("registerForm").addEventListener("submit", function(e){
  e.preventDefault();

  const username = document.getElementById("username").value;
  const emailOrPhone = document.getElementById("emailOrPhone").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if(password !== confirmPassword){
    alert("كلمة المرور غير متطابقة");
    return;
  }

  auth.createUserWithEmailAndPassword(emailOrPhone, password)
    .then((userCredential)=>{
      const user = userCredential.user;

      return db.collection("users").doc(user.uid).set({
        username: username,
        emailOrPhone: emailOrPhone,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        balance: 100
      }).then(()=>{
        localStorage.setItem("loginEmail", emailOrPhone);
        localStorage.setItem("loginPass", password);
        window.location.href="login.html";
      });
    })
    .catch((error)=>{
      alert(error.message);
    });
});

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    location.href="index.html";
  }
}
</script>
