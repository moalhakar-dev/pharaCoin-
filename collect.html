    <!-- الخطوط والأنماط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}

        body{
          font-family:'Cairo',sans-serif;
          background:url("Object/qa.jpg") no-repeat center center fixed;
          background-size:cover;
          color:white;
          max-width:420px;
          margin:auto;
        }

        body::before{
          content:"";
          position:fixed;
          inset:0;
          background:rgba(0,0,0,0.85);
          z-index:-1;
        }

        /* ===== Header ===== */
        .header{
          position:sticky;
          top:0;
          display:flex;
          justify-content:space-between;
          align-items:center;
          padding:15px 15px;
          background:rgba(0,0,0,0.9);
          border-bottom:1px solid rgba(255,215,0,0.3);
          backdrop-filter:blur(10px);
          z-index:10;
        }

        .header h1{
          font-size:18px;
          font-weight:900;
          color:gold;
          text-shadow:0 0 15px gold;
          margin:0;
        }

        .back{
          font-size:13px;
          color:#00ffcc;
          cursor:pointer;
        }

        /* ===== Progress ===== */
        .progress-container{
          margin:15px;
        }

        .progress-container > div{
          margin-bottom:6px;
          font-weight:bold;
          color:#00ffcc;
        }

        .progress-bar{
          width:100%;
          background:#333;
          border-radius:15px;
          overflow:hidden;
        }

        .progress{
          height:20px;
          width:0%;
          background:linear-gradient(to right,gold,orange);
          transition:0.5s;
        }

        /* عنوان القسم */
        h2.visually-hidden {
          position: absolute;
          width: 1px;
          height: 1px;
          margin: -1px;
          padding: 0;
          overflow: hidden;
          clip: rect(0, 0, 0, 0);
          border: 0;
        }

        /* ===== Cards ===== */
        .container{
          padding:15px;
          display:flex;
          flex-direction:column;
          gap:18px;
        }

        .card{
          background:rgba(0,0,0,0.7);
          border:2px solid gold;
          border-radius:20px;
          padding:15px;
          display:flex;
          align-items:center;
          gap:15px;
          cursor:pointer;
          transition:0.3s;
          box-shadow:0 0 15px rgba(255,215,0,0.4);
          position:relative;
        }

        .card:hover{
          transform:scale(1.03);
          box-shadow:0 0 25px gold;
        }

        .card img{
          width:80px;
          height:80px;
          border-radius:15px;
          object-fit:cover;
          border:2px solid gold;
        }

        .card-info{ flex:1; }

        .statue-name{
          font-size:16px;
          font-weight:800;
          color:gold;
        }

        .details{
          display:none;
          margin-top:5px;
          font-size:13px;
          color:#00ffcc;
          font-weight:bold;
        }

        /* Locked */
        .locked{
          opacity:0.5;
        }

        .locked::after{
          content:"🔒 مغلق";
          position:absolute;
          left:10px;
          top:10px;
          background:black;
          padding:4px 8px;
          border-radius:10px;
          font-size:11px;
          color:gold;
        }

        /* Rare Card */
        .rare-card{
          background:linear-gradient(45deg,#000,#222);
          border:3px solid gold;
          border-radius:25px;
          padding:20px;
          text-align:center;
          color:gold;
          font-weight:900;
          font-size:17px;
          animation:rareGlow 0.7s infinite alternate;
          position:relative;
        }

        @keyframes rareGlow{
          from{ box-shadow:0 0 20px rgba(255,215,0,0.5); }
          to{ box-shadow:0 0 50px rgba(255,215,0,1); }
        }

        /* Footer Back */
        .footer-back{
          text-align:center;
          margin:25px 0 30px;
        }
        .footer-back button{
          padding:12px 22px;
          border:none;
          border-radius:15px;
          background:gold;
          color:black;
          font-weight:bold;
          cursor:pointer;
          box-shadow:0 0 15px gold;
          font-family:'Cairo',sans-serif;
        }
    </style>
</head>
<body>

<div class="header">
  <h1>🏺 تجميع التماثيل</h1>  <!-- تم تغيير div إلى h1 لتحسين SEO -->
  <div class="back" onclick="goBack()" aria-label="العودة للصفحة السابقة">⬅ رجوع</div>
</div>

<div class="progress-container">
  <div>نسبة التقدم الكلية</div>
  <div class="progress-bar">
    <div class="progress" id="globalProgress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
  </div>
</div>

<!-- عنوان مخفي لقائمة المراحل لتحسين البنية -->
<h2 class="visually-hidden">مراحل التجميع المتاحة</h2>

<div class="container">

  <!-- بطاقة أبو الهول (غير مقفولة افتراضياً) -->
  <div class="card" id="statue1" onclick="handleClick(1,this)" aria-label="مرحلة أبو الهول، تجميع 5 أجزاء">
    <img src="Object/qf.jpg" alt="تمثال أبو الهول">
    <div class="card-info">
      <div class="statue-name">أبو الهول</div>
      <div class="details">5 أجزاء — المكافأة 350 🪙</div>
    </div>
  </div>

  <!-- بطاقة توت عنخ آمون (مقفولة) -->
  <div class="card locked" id="statue2" onclick="handleClick(2,this)" aria-label="مرحلة توت عنخ آمون، تجميع 5 أجزاء (مغلقة)">
    <img src="Object/qa.jpg" alt="تمثال توت عنخ آمون">
    <div class="card-info">
      <div class="statue-name">توت عنخ آمون</div>
      <div class="details">5 أجزاء — المكافأة 300 🪙</div>
    </div>
  </div>

  <!-- بطاقة نفرتيتي (مقفولة) -->
  <div class="card locked" id="statue3" onclick="handleClick(3,this)" aria-label="مرحلة نفرتيتي، تجميع 4 أجزاء (مغلقة)">
    <img src="Object/qs.jpg" alt="تمثال نفرتيتي">
    <div class="card-info">
      <div class="statue-name">نفرتيتي</div>
      <div class="details">4 أجزاء — المكافأة 250 🪙</div>
    </div>
  </div>

  <!-- بطاقة أنوبيس (مقفولة) -->
  <div class="card locked" id="statue4" onclick="handleClick(4,this)" aria-label="مرحلة أنوبيس، تجميع 4 أجزاء (مغلقة)">
    <img src="Object/qd.jpg" alt="تمثال أنوبيس">
    <div class="card-info">
      <div class="statue-name">أنوبيس</div>
      <div class="details">4 أجزاء — المكافأة 250 🪙</div>
    </div>
  </div>

  <!-- البطاقة النادرة (مقفولة) -->
  <div class="rare-card locked" id="rareCard" aria-label="القطعة النادرة الملكية، تحتاج جميع التماثيل مكتملة">
    ✨ القطعة النادرة الملكية ✨  
    <br><br>
    تحتاج جميع التماثيل مكتملة  
    <br>
    المكافأة الكبرى 1000 🪙
  </div>

</div>

<div class="footer-back">
  <button onclick="location.href='dashboard.html'" aria-label="العودة للوحة التحكم">العودة للوحة التحكم</button>
</div>

<script>
function toggleDetails(card){
  let detail = card.querySelector(".details");
  if(detail){
    detail.style.display = detail.style.display==="block" ? "none" : "block";
  }
}

function handleClick(num,card){
  toggleDetails(card);
  if(card.classList.contains("locked")) return;

  // الانتقال إلى صفحة المرحلة المحددة (يمكن تغيير الروابط حسب هيكل موقعك)
  if(num===1) window.location.href="statue.html";      // يمكنك تغيير الرابط
  if(num===2) window.location.href="statue2.html";     // يمكنك تغيير الرابط
  if(num===3) window.location.href="statue3.html";     // يمكنك تغيير الرابط
  if(num===4) window.location.href="statue4.html";     // يمكنك تغيير الرابط
}

function checkProgress(){
  let completed=0;

  // يتم تخزين حالة إكمال كل مرحلة في localStorage
  if(localStorage.getItem("statue1Done")){
    document.getElementById("statue2").classList.remove("locked");
    completed++;
  }
  if(localStorage.getItem("statue2Done")){
    document.getElementById("statue3").classList.remove("locked");
    completed++;
  }
  if(localStorage.getItem("statue3Done")){
    document.getElementById("statue4").classList.remove("locked");
    completed++;
  }
  if(localStorage.getItem("statue4Done")){
    completed++;
  }

  let percent=(completed/4)*100;
  let progressBar = document.getElementById("globalProgress");
  progressBar.style.width = percent+"%";
  progressBar.setAttribute('aria-valuenow', percent);

  if(percent===100){
    document.getElementById("rareCard").classList.remove("locked");
  }
}
checkProgress();

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    location.href='dashboard.html';
  }
}
</script>

<!-- الأجزاء التي تحتاج تغيير (تلخيص) -->
<!--
  1. روابط الصور الاجتماعية (og:image, twitter:image) استبدل yourdomain.com بالرابط الفعلي لصورك.
  2. روابط URL (og:url, canonical, JSON-LD) استبدل yourdomain.com بنطاق موقعك.
  3. حساب تويتر (twitter:site) غيّره إلى حسابك أو احذفه.
  4. روابط الانتقال في دالة handleClick (statue.html, statue2.html, ...) تأكد من أنها تطابق أسماء الصفحات الفعلية في موقعك.
-->
</body>
