        /* ===== التصميم الجديد للـ Navbar بالرموز المصرية ===== */
        .bottom-nav{

        .nav-circle{
          width:55px;
          height:55px;
          border-radius:50%;

          margin: 0 auto 4px;
          transition: all 0.3s ease;
          box-shadow: 0 0 10px rgba(180, 40, 40, 0.6);
        }

        /* العنصر النشط (الصفحة الحالية) - لونه أصفر مع نبض */

          color: #FFD700; /* ذهبي */
          border-color: #FFD700; /* إطار ذهبي */
          box-shadow: 0 0 15px #FFD700;

        @keyframes pulse{
          0%{box-shadow:0 0 5px #FFD700;}
          50%{box-shadow:0 0 20px #FFD700;}

        /* النص أسفل الدائرة - يظهر فقط أثناء الـ 3 ثوان */

        /* Transition */

  <div class="nav-item" data-url="dashboard.html" data-label="الرئيسية" data-egypt="𓂀" data-alt="🏠" aria-label="الصفحة الرئيسية">

    <div class="nav-circle">𓁹</div>

    <div class="nav-circle">☥</div>
    <div class="nav-label">حسابي</div>
  </div>

<script>
/* الصوت */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();
function playSound() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = 700;
  g.gain.value = 0.05;
  o.start(); o.stop(audioCtx.currentTime + 0.12);
}

/* بيانات العملات والخبرة */
let coins = parseInt(localStorage.getItem("coins") || "0");
let xp = parseInt(localStorage.getItem("xp") || "0");

/* تحميل حالة الأجزاء مع دعم النظام القديم (boolean) */
function loadParts() {
  let stored = localStorage.getItem("statue3_parts");
  if (!stored) return [0, 0, 0, 0, 0, 0]; // 6 أجزاء
  let parsed = JSON.parse(stored);
  // إذا كانت مصفوفة منطقية (true/false) نحولها إلى أعداد: true→4 , false→0
  if (parsed.every(v => typeof v === "boolean")) {
    return parsed.map(v => v ? 4 : 0);
  }
  // إذا كانت مصفوفة أعداد صحيحة (0-4) نستخدمها مباشرة
  if (parsed.every(v => typeof v === "number")) {
    return parsed;
  }
  // أي حالة أخرى نعيد الصفر
  return [0, 0, 0, 0, 0, 0];
}

let partsCount = loadParts(); // [عدد مرات تجميع الجزء0, الجزء1, ...] كلها 0-4

const coinsSpan = document.getElementById("coins");
const progress = document.getElementById("progress");
const msg = document.getElementById("msg");
// مصفوفات العناصر (لـ 6 أجزاء)
const imgs = [
  document.getElementById("img0"),
  document.getElementById("img1"),
  document.getElementById("img2"),
  document.getElementById("img3"),
  document.getElementById("img4"),
  document.getElementById("img5")
];
const counters = [
  document.getElementById("counter0"),
  document.getElementById("counter1"),
  document.getElementById("counter2"),
  document.getElementById("counter3"),
  document.getElementById("counter4"),
  document.getElementById("counter5")
];
const btns = [
  document.getElementById("btn0"),
  document.getElementById("btn1"),
  document.getElementById("btn2"),
  document.getElementById("btn3"),
  document.getElementById("btn4"),
  document.getElementById("btn5")
];
const prices = [200, 350, 500, 700, 1000, 1500]; // أسعار كل جزء

coinsSpan.innerText = coins;

function updateUI() {
  // عدد الأجزاء المكتملة (التي وصلت لـ 4)
  let completedCount = partsCount.filter(c => c === 4).length;
  progress.style.width = (completedCount / partsCount.length) * 100 + "%";

  // تحديث كل جزء
  partsCount.forEach((count, i) => {
    // العداد
    counters[i].innerText = count + "/4";
    // الصورة: active فقط إذا كان count === 4
    if (count === 4) {
      imgs[i].classList.add("active");
      btns[i].disabled = true;
      btns[i].innerText = "✔ مكتمل";
    } else {
      imgs[i].classList.remove("active");
      btns[i].disabled = false;
      btns[i].innerText = `تجميع (${prices[i]}🪙)`;
    }
  });

  // إذا اكتمل الكل
  if (completedCount === partsCount.length) {
    document.getElementById("fullStatue").style.display = "block";
  } else {
    document.getElementById("fullStatue").style.display = "none";
  }
}

function buyPart(index, price) {
  // لا يمكن التجميع إذا كان الجزء مكتملاً (4)
  if (partsCount[index] >= 4) return;

  // تحقق من الرصيد
  if (coins < price) {
    window.location.href = "deposit.html";
    return;
  }

  // خصم العملات وإضافة خبرة
  coins -= price;
  xp += 10; // خبرة ثابتة لكل تجميعة

  // زيادة عداد هذا الجزء
  partsCount[index]++;

  // حفظ كل شيء
  localStorage.setItem("coins", coins);
  localStorage.setItem("xp", xp);
  localStorage.setItem("statue3_parts", JSON.stringify(partsCount));

  // تحديث الواجهة
  coinsSpan.innerText = coins;
  msg.innerText = "✨ تم استرداد قطعة أسطورية";
  playSound();
  updateUI();

  // التحقق مما إذا اكتمل التمثال بالكامل
  checkComplete();
}

function checkComplete() {
  if (partsCount.every(c => c === 4)) {
    // مكافأة الإكمال
    coins += 2000;
    xp += 50;
    localStorage.setItem("coins", coins);
    localStorage.setItem("xp", xp);
    coinsSpan.innerText = coins;
    msg.innerText = "🔥 اكتمل التمثال الأسطوري! تم منحك 2000 عملة + 50 XP";
    document.getElementById("transition").style.display = "flex";
    // إخفاء الانتقال بعد ثانيتين
    setTimeout(() => {
      document.getElementById("transition").style.display = "none";
    }, 2000);
  }
}

// ===== آلية النقر الجديدة للـ Navbar =====
function playClick() {
  playSound(); // استخدام نفس دالة الصوت
}

const navItems = document.querySelectorAll('.nav-item');

// مصفوفة لتخزين حالة "تم عرض التأثير" لكل عنصر
let effectShown = new Array(navItems.length).fill(false);
let timerId = null;
let currentItem = null;

// دالة لعرض التأثير (تغيير الرمز وإظهار النص)
function showEffect(item) {
  // إذا كان العنصر هو الصفحة الحالية، لا نفعل شيئاً
  if (item.classList.contains('current-page')) return;
  
  // إذا كان هناك تأثير سابق قيد العرض، نلغيه
  if (timerId) {
    clearTimeout(timerId);
    timerId = null;
    if (currentItem) {
      const oldCircle = currentItem.querySelector('.nav-circle');
      const oldEgypt = currentItem.dataset.egypt;
      oldCircle.textContent = oldEgypt;
      currentItem.classList.remove('showing');
    }
  }
  
  // تعيين العنصر الحالي وعرض التأثير
  currentItem = item;
  const circle = item.querySelector('.nav-circle');
  const altSymbol = item.dataset.alt;
  circle.textContent = altSymbol;
  item.classList.add('showing');
  
  // مؤقت لإعادة الرمز المصري بعد 3 ثوان
  timerId = setTimeout(() => {
    const circle = currentItem.querySelector('.nav-circle');
    const egyptSymbol = currentItem.dataset.egypt;
    circle.textContent = egyptSymbol;
    currentItem.classList.remove('showing');
    
    timerId = null;
    currentItem = null;
  }, 3000);
}

// معالج النقر لكل عنصر
navItems.forEach((item, index) => {
  item.addEventListener('click', function(e) {
    e.stopPropagation();
    playClick(); // استخدام دالة الصوت
    
    // إذا كان العنصر هو الصفحة الحالية، لا ننقل
    if (this.classList.contains('current-page')) return;
    
    // إذا كان التأثير قد ظهر من قبل لهذا العنصر (أي هذه هي الضغطة الثانية) → ننتقل
    if (effectShown[index]) {
      window.location.href = this.dataset.url;
      return;
    }
    
    // وإلا (أول ضغطة) → نعرض التأثير ونسجل أنه تم عرضه
    showEffect(this);
    effectShown[index] = true;
  });
});

// بدء التشغيل
updateUI();
</script>
